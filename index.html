<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub Pages Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" id="manifest" href="">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px; /* For bottom nav */
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:active {
            transform: scale(0.98);
        }
        .bottom-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e5e7eb;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast {
            animation: slideUp 0.3s ease-out forwards, fadeOut 0.3s ease-in 2.7s forwards;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-white/90 backdrop-blur-md shadow-sm px-4 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-brands fa-github text-2xl"></i> Pages Hub
        </h1>
        <div class="flex items-center gap-3">
            <span id="sync-status" class="text-xs text-gray-500 hidden"><i class="fa-solid fa-arrows-rotate fa-spin"></i> 同期中...</span>
            <button onclick="UI.openSettingsModal()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4">
        <!-- Search & Filter -->
        <div class="mb-6 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="検索 (URL, タイトル...)" class="w-full bg-white border border-gray-200 rounded-2xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition">
        </div>

        <!-- Pages List -->
        <div id="pagesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Cards will be injected here -->
        </div>
        
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-gray-400">
            <i class="fa-brands fa-github text-6xl mb-4 text-gray-300"></i>
            <p>登録されたページがありません</p>
            <p class="text-sm mt-2">右下の「＋」ボタンから追加してください</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 w-full z-20 flex justify-around items-center py-2 px-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="App.renderPages()" class="flex flex-col items-center text-blue-600 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">ホーム</span>
        </button>
        <button onclick="App.renderFavorites()" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition w-16">
            <i class="fa-solid fa-star text-xl mb-1"></i>
            <span class="text-[10px] font-medium">お気に入り</span>
        </button>
        <!-- FAB Center -->
        <div class="relative -top-6">
            <button onclick="UI.openAddModal()" class="w-14 h-14 bg-blue-600 rounded-full shadow-lg flex items-center justify-center text-white text-2xl hover:bg-blue-700 transition transform hover:scale-105 active:scale-95">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <button onclick="App.syncAll()" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition w-16">
            <i class="fa-solid fa-rotate-right text-xl mb-1"></i>
            <span class="text-[10px] font-medium">一括更新</span>
        </button>
        <button onclick="UI.openHistoryModal()" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition w-16">
            <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
            <span class="text-[10px] font-medium">履歴/復元</span>
        </button>
    </nav>

    <!-- Add/Edit Modal -->
    <div id="addModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="UI.closeModal('addModal')"></div>
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="addModalContent">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h2 class="text-xl font-bold mb-4" id="modalTitle">ページの追加</h2>
            <form id="pageForm" onsubmit="App.handleSavePage(event)">
                <input type="hidden" id="pageId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">GitHub Pages URL *</label>
                    <input type="url" id="pageUrl" required placeholder="https://username.github.io/repo/" class="w-full border border-gray-300 rounded-xl py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="App.saveDraft()">
                    <p class="text-xs text-red-500 mt-1 hidden" id="urlError">有効なGitHub PagesのURLを入力してください。</p>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">タイトル (任意)</label>
                    <input type="text" id="pageTitle" placeholder="自動取得されます" class="w-full border border-gray-300 rounded-xl py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="App.saveDraft()">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">メモ・タグ</label>
                    <textarea id="pageMemo" rows="2" class="w-full border border-gray-300 rounded-xl py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="App.saveDraft()"></textarea>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="UI.closeModal('addModal')" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">キャンセル</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition flex justify-center items-center gap-2">
                        <i class="fa-solid fa-check"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings & Backup Modal -->
    <div id="settingsModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="UI.closeModal('settingsModal')"></div>
        <div class="bg-white w-full sm:w-96 max-h-[90vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="settingsModalContent">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h2 class="text-xl font-bold mb-4">データ管理・設定</h2>
            
            <div class="space-y-4">
                <!-- PAT Settings -->
                <div class="p-4 bg-gray-50 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-800 mb-2"><i class="fa-brands fa-github"></i> API Key (PAT)</h3>
                    <p class="text-xs text-gray-500 mb-3">API制限の緩和やより詳細な情報取得に使用します。</p>
                    <div class="flex gap-2">
                        <input type="password" id="githubPat" placeholder="ghp_..." class="flex-1 border border-gray-300 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="App.saveGithubPat()" class="py-2 px-4 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-900 transition">保存</button>
                    </div>
                </div>

                <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <h3 class="font-bold text-blue-800 mb-2"><i class="fa-solid fa-file-export"></i> エクスポート</h3>
                    <p class="text-sm text-blue-600 mb-3">全データをJSONとしてバックアップします。</p>
                    <button onclick="App.exportData()" class="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">ダウンロード</button>
                </div>

                <div class="p-4 bg-green-50 rounded-xl border border-green-100">
                    <h3 class="font-bold text-green-800 mb-2"><i class="fa-solid fa-file-import"></i> インポート</h3>
                    <p class="text-sm text-green-600 mb-3">JSONファイルからデータを復元します。</p>
                    <input type="file" id="importFile" accept=".json" class="hidden" onchange="App.importData(event)">
                    <button onclick="document.getElementById('importFile').click()" class="w-full py-2 bg-green-600 text-white rounded-lg text-sm font-medium">ファイルを選択</button>
                </div>
                
                <div class="p-4 bg-red-50 rounded-xl border border-red-100">
                    <h3 class="font-bold text-red-800 mb-2"><i class="fa-solid fa-trash"></i> 全データ削除</h3>
                    <button onclick="App.clearAllData()" class="w-full py-2 bg-red-600 text-white rounded-lg text-sm font-medium">初期化</button>
                </div>
            </div>
            
            <button onclick="UI.closeModal('settingsModal')" class="w-full mt-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">閉じる</button>
        </div>
    </div>

    <!-- Backup History Modal -->
    <div id="historyModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="UI.closeModal('historyModal')"></div>
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="historyModalContent">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h2 class="text-xl font-bold mb-1">5世代バックアップ</h2>
            <p class="text-xs text-gray-500 mb-4">自動保存された過去の状態へ復元できます</p>
            
            <div id="backupList" class="space-y-3 max-h-60 overflow-y-auto pr-1">
                <!-- Backup items injected here -->
            </div>
            
            <button onclick="UI.closeModal('historyModal')" class="w-full mt-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">閉じる</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // ==========================================
        // 1. PWA Manifest Injection
        // ==========================================
        const manifest = {
            name: "GitHub Pages Hub",
            short_name: "GPHub",
            start_url: ".",
            display: "standalone",
            background_color: "#f3f4f6",
            theme_color: "#2563eb",
            icons: [{
                src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTEyIDBDNS4zNyAwIDAgNS4zNyAwIDEyYzAgNS4zMSAzLjQzNSA5LjgyNiA4LjIwNiAxMS4zODcuNi4xMTEuODE4LS4yNi44MTgtLjU3OHYtMi4wNDRjLTMuMzM4LjcyNC00LjA0Mi0xLjYxLTQuMDQyLTEuNjFDNC40MjIgMTguMDcgMy42MzMgMTcuNyAzLjYzMyAxNy43Yy0xLjA4Ny0uNzQ0LjA4NC0uNzI5LjA4NC0uNzI5IDEuMjA1LjA4NCAxLjgzOCAxLjIzNiAxLjgzOCAxLjIzNiAxLjA3IDEuODM1IDIuODA5IDEuMzA1IDMuNDk1Ljk5OC4xMDgtLjc3Ni40MTctMS4zMDUuNzYtMS42MDUtMi42NjUtLjMwMy01LjQ2Ni0xLjMzMi01LjQ2Ni01LjkzIDAtMS4zMS40NjUtMi4zOCAxLjIzNS0zLjIyMi0uMTIzLS4zMDMtLjUzNS0xLjUyMy4xMTctMy4xNzYgMCAwIDEuMDA4LS4zMjIgMy4zMDEgMS4yMy45NTctLjI2NiAxLjk4My0uMzk4IDMuMDAzLS40MDQgMS4wMi4wMDYgMi4wNDYuMTM4IDMuMDAzLjQwNCAyLjI5MS0xLjU1MiAzLjI5Ny0xLjIzIDMyLjk3LTEuMjMuNjUzIDEuNjUzLjI0MiAyLjg3NC4xMTggMy4xNzYuNzcuODQgMS4yMzUgMS45MTEgMS4yMzUgMy4yMjIgMCA0LjYxLTIuODA1IDUuNjI1LTUuNDc1IDUuOTIuNDIuMzYuODEgMS4wOTYuODEgMi4yMmwwIDMuMjJjMCAuMzIuMjE2LjY5NC44MjUuNTc2QzIwLjU2NSAyMS44MjYgMjQgMTcuMzEgMjQgMTJjMC02LjYzLLTUuMzctMTItMTItMTJ6IiBmaWxsPSIjMjU2M2ViIi8+PC9zdmc+",
                sizes: "192x192",
                type: "image/svg+xml"
            }]
        };
        document.getElementById('manifest').href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));

        // ==========================================
        // 2. Database Wrapper (IndexedDB)
        // ==========================================
        class DB {
            constructor() {
                this.dbName = 'GitHubPagesHubDB';
                this.version = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('pages')) {
                            db.createObjectStore('pages', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('backups')) {
                            db.createObjectStore('backups', { keyPath: 'timestamp' });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve();
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            async get(storeName, key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const req = tx.objectStore(storeName).get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const req = tx.objectStore(storeName).getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const req = tx.objectStore(storeName).put(data);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            async delete(storeName, key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const req = tx.objectStore(storeName).delete(key);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            }

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const req = tx.objectStore(storeName).clear();
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            }
        }
        const db = new DB();

        // ==========================================
        // 3. Web Worker (Async Background Tasks)
        // ==========================================
        const workerCode = `
            self.onmessage = async function(e) {
                const { type, payload } = e.data;
                if (type === 'FETCH_METADATA') {
                    const { id, url, pat } = payload;
                    try {
                        let title = "";
                        let description = "";
                        let lastUpdated = new Date().toISOString();
                        
                        // Parse GitHub URL to guess API endpoint
                        // URL formats: username.github.io or username.github.io/repo
                        const match = url.match(/https?:\\/\\/([\\w-]+)\\.github\\.io\\/?([\\w-]+)?/i);
                        
                        if (match) {
                            const user = match[1];
                            const repo = match[2];
                            const apiUrl = repo ? \`https://api.github.com/repos/\${user}/\${repo}\` : \`https://api.github.com/users/\${user}\`;
                            
                            const headers = {};
                            if (pat) {
                                headers['Authorization'] = \`Bearer \${pat}\`;
                            }
                            
                            const res = await fetch(apiUrl, { headers });
                            if (res.ok) {
                                const data = await res.json();
                                title = repo ? data.name : (data.name || \`\${user}'s Page\`);
                                description = data.description || "";
                                lastUpdated = data.updated_at || lastUpdated;
                            }
                        }
                        
                        self.postMessage({ type: 'METADATA_RESULT', payload: { id, title, description, lastUpdated, status: 'success' } });
                    } catch (err) {
                        self.postMessage({ type: 'METADATA_RESULT', payload: { id, status: 'error', error: err.message } });
                    }
                }
            };
        `;
        const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(workerBlob));

        // ==========================================
        // 4. Wake Lock API
        // ==========================================
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.warn('Wake Lock error:', err); }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => wakeLock = null);
            }
        }

        // ==========================================
        // 5. App Logic
        // ==========================================
        const UI = {
            showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                const colors = {
                    success: 'bg-gray-800 text-white',
                    error: 'bg-red-600 text-white',
                    info: 'bg-blue-600 text-white'
                };
                toast.className = `px-4 py-2 rounded-full shadow-lg text-sm font-medium toast ${colors[type]} flex items-center gap-2`;
                toast.innerHTML = type === 'success' ? `<i class="fa-solid fa-check-circle"></i> ${message}` : message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },
            openModal(id) {
                const modal = document.getElementById(id);
                const content = document.getElementById(id + 'Content');
                modal.classList.remove('hidden');
                // Allow reflow
                void modal.offsetWidth;
                content.classList.remove('translate-y-full');
            },
            closeModal(id) {
                const modal = document.getElementById(id);
                const content = document.getElementById(id + 'Content');
                content.classList.add('translate-y-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            },
            openAddModal(pageId = null) {
                const form = document.getElementById('pageForm');
                const urlInput = document.getElementById('pageUrl');
                document.getElementById('urlError').classList.add('hidden');
                
                if (pageId) {
                    document.getElementById('modalTitle').innerText = 'ページの編集';
                    const page = App.pages.find(p => p.id === pageId);
                    if(page) {
                        document.getElementById('pageId').value = page.id;
                        document.getElementById('pageUrl').value = page.url;
                        document.getElementById('pageTitle').value = page.title || '';
                        document.getElementById('pageMemo').value = page.memo || '';
                    }
                } else {
                    document.getElementById('modalTitle').innerText = 'ページの追加';
                    form.reset();
                    document.getElementById('pageId').value = '';
                    // Resume from draft
                    const draftUrl = localStorage.getItem('draftUrl');
                    if(draftUrl) urlInput.value = draftUrl;
                    document.getElementById('pageTitle').value = localStorage.getItem('draftTitle') || '';
                    document.getElementById('pageMemo').value = localStorage.getItem('draftMemo') || '';
                }
                this.openModal('addModal');
            },
            openSettingsModal() { this.openModal('settingsModal'); },
            openHistoryModal() { 
                App.renderBackups();
                this.openModal('historyModal'); 
            }
        };

        const App = {
            pages: [],
            filterMode: 'all',
            searchQuery: '',

            async init() {
                try {
                    await db.init();
                    this.loadSettings();
                    await this.loadPages();
                    this.setupListeners();
                    this.setupWorker();
                    
                    // Resume sync if it was interrupted (dummy check)
                    if(localStorage.getItem('syncInProgress') === 'true') {
                        this.syncAll();
                    }
                } catch (e) {
                    console.error("Initialization failed:", e);
                    UI.showToast("データベースの初期化に失敗しました", "error");
                }
            },

            loadSettings() {
                const pat = localStorage.getItem('githubPat');
                if (pat) {
                    document.getElementById('githubPat').value = pat;
                }
            },

            saveGithubPat() {
                const pat = document.getElementById('githubPat').value.trim();
                if (pat) {
                    localStorage.setItem('githubPat', pat);
                    UI.showToast("GitHub PATを保存しました", "success");
                } else {
                    localStorage.removeItem('githubPat');
                    UI.showToast("GitHub PATを削除しました", "info");
                }
            },
            
            getGithubPat() {
                return localStorage.getItem('githubPat') || '';
            },

            async loadPages() {
                this.pages = await db.getAll('pages');
                // Sort by latest added/updated
                this.pages.sort((a, b) => b.updatedAt - a.updatedAt);
                this.renderPages();
            },

            setupListeners() {
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchQuery = e.target.value.toLowerCase();
                    this.renderList();
                });
            },

            setupWorker() {
                worker.onmessage = async (e) => {
                    const { type, payload } = e.data;
                    if (type === 'METADATA_RESULT') {
                        const pageIndex = this.pages.findIndex(p => p.id === payload.id);
                        if (pageIndex > -1 && payload.status === 'success') {
                            const p = this.pages[pageIndex];
                            // Update only if user hasn't set custom title or it was empty
                            if(!p.hasCustomTitle && payload.title) p.title = payload.title;
                            p.description = payload.description || p.description;
                            p.githubUpdatedAt = payload.lastUpdated;
                            p.isSyncing = false;
                            
                            await db.put('pages', p);
                            this.renderList();
                        } else if(pageIndex > -1) {
                            this.pages[pageIndex].isSyncing = false;
                            this.renderList();
                        }
                        this.checkSyncCompletion();
                    }
                };
            },

            checkSyncCompletion() {
                const isAnySyncing = this.pages.some(p => p.isSyncing);
                if (!isAnySyncing) {
                    document.getElementById('sync-status').classList.add('hidden');
                    localStorage.removeItem('syncInProgress');
                    releaseWakeLock();
                    this.createBackup(); // Auto backup after sync
                }
            },

            saveDraft() {
                if(!document.getElementById('pageId').value) {
                    localStorage.setItem('draftUrl', document.getElementById('pageUrl').value);
                    localStorage.setItem('draftTitle', document.getElementById('pageTitle').value);
                    localStorage.setItem('draftMemo', document.getElementById('pageMemo').value);
                }
            },
            clearDraft() {
                localStorage.removeItem('draftUrl');
                localStorage.removeItem('draftTitle');
                localStorage.removeItem('draftMemo');
            },

            validateUrl(url) {
                return /^https?:\/\/([\w-]+)\.github\.io/i.test(url);
            },

            async handleSavePage(e) {
                e.preventDefault();
                const idInput = document.getElementById('pageId').value;
                const url = document.getElementById('pageUrl').value.trim();
                const title = document.getElementById('pageTitle').value.trim();
                const memo = document.getElementById('pageMemo').value.trim();

                if (!this.validateUrl(url)) {
                    document.getElementById('urlError').classList.remove('hidden');
                    return;
                }

                const now = Date.now();
                let page = null;

                if (idInput) {
                    page = this.pages.find(p => p.id === idInput);
                    if(page) {
                        page.url = url;
                        page.hasCustomTitle = title !== '';
                        page.title = title || page.title;
                        page.memo = memo;
                        page.updatedAt = now;
                    }
                } else {
                    page = {
                        id: 'page_' + now,
                        url,
                        title: title || '取得中...',
                        hasCustomTitle: title !== '',
                        description: '',
                        memo,
                        isFavorite: false,
                        createdAt: now,
                        updatedAt: now,
                        isSyncing: true
                    };
                    this.pages.unshift(page);
                }

                await db.put('pages', page);
                await this.createBackup(); // Auto backup on save
                
                UI.closeModal('addModal');
                this.clearDraft();
                this.renderList();
                UI.showToast(idInput ? "更新しました" : "追加しました", "success");

                // Request metadata fetch for new/updated url
                if(!idInput || url !== page.url) {
                    worker.postMessage({ type: 'FETCH_METADATA', payload: { id: page.id, url: page.url, pat: this.getGithubPat() } });
                }
            },

            async toggleFavorite(id, e) {
                e.stopPropagation();
                const page = this.pages.find(p => p.id === id);
                if (page) {
                    page.isFavorite = !page.isFavorite;
                    await db.put('pages', page);
                    this.renderList();
                }
            },

            async deletePage(id, e) {
                e.stopPropagation();
                if(confirm('このページを削除しますか？')) {
                    await db.delete('pages', id);
                    this.pages = this.pages.filter(p => p.id !== id);
                    await this.createBackup();
                    this.renderList();
                    UI.showToast("削除しました");
                }
            },

            renderPages() {
                this.filterMode = 'all';
                this.renderList();
            },

            renderFavorites() {
                this.filterMode = 'favorites';
                this.renderList();
            },

            renderList() {
                const container = document.getElementById('pagesList');
                const emptyState = document.getElementById('emptyState');
                container.innerHTML = '';

                let filtered = this.pages;
                if (this.filterMode === 'favorites') {
                    filtered = filtered.filter(p => p.isFavorite);
                }
                
                if (this.searchQuery) {
                    filtered = filtered.filter(p => 
                        p.url.toLowerCase().includes(this.searchQuery) ||
                        (p.title && p.title.toLowerCase().includes(this.searchQuery)) ||
                        (p.memo && p.memo.toLowerCase().includes(this.searchQuery))
                    );
                }

                if (filtered.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    filtered.forEach(page => {
                        const domainMatch = page.url.match(/https?:\/\/([\w-]+)\.github\.io/i);
                        const username = domainMatch ? domainMatch[1] : 'Unknown';
                        
                        const card = document.createElement('div');
                        card.className = 'card p-4 relative cursor-pointer flex flex-col h-full';
                        card.onclick = () => window.open(page.url, '_blank', 'noopener,noreferrer');
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-2 overflow-hidden">
                                    <img src="https://github.com/${username}.png" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTEyIDBDNS4zNyAwIDAgNS4zNyAwIDEyYzAgNS4zMSAzLjQzNSA5LjgyNiA4LjIwNiAxMS4zODcuNi4xMTEuODE4LS4yNi44MTgtLjU3OHYtMi4wNDRjLTMuMzM4LjcyNC00LjA0Mi0xLjYxLTQuMDQyLTEuNjFDNC40MjIgMTguMDcgMy42MzMgMTcuNyAzLjYzMyAxNy43Yy0xLjA4Ny0uNzQ0LjA4NC0uNzI5LjA4NC0uNzI5IDEuMjA1LjA4NCAxLjgzOCAxLjIzNiAxLjgzOCAxLjIzNiAxLjA3IDEuODM1IDIuODA5IDEuMzA1IDMuNDk1Ljk5OC4xMDgtLjc3Ni40MTctMS4zMDUuNzYtMS42MDUtMi42NjUtLjMwMy01LjQ2Ni0xLjMzMi01LjQ2Ni01LjkzIDAtMS4zMS40NjUtMi4zOCAxLjIzNS0zLjIyMi0uMTIzLS4zMDMtLjUzNS0xLjUyMy4xMTctMy4xNzYgMCAwIDEuMDA4LS4zMjIgMy4zMDEgMS4yMy45NTctLjI2NiAxLjk4My0uMzk4IDMuMDAzLS40MDQgMS4wMi4wMDYgMi4wNDYuMTM4IDMuMDAzLjQwNCAyLjI5MS0xLjU1MiAzLjI5Ny0xLjIzIDMyLjk3LTEuMjMuNjUzIDEuNjUzLjI0MiAyLjg3NC4xMTggMy4xNzYuNzcuODQgMS4yMzUgMS45MTEgMS4yMzUgMy4yMjIgMCA0LjYxLTIuODA1IDUuNjI1LTUuNDc1IDUuOTIuNDIuMzYuODEgMS4wOTYuODEgMi4yMmwwIDMuMjJjMCAuMzIuMjE2LjY5NC44MjUuNTc2QzIwLjU2NSAyMS44MjYgMjQgMTcuMzEgMjQgMTJjMC02LjYzLLTUuMzctMTItMTItMTJ6IiBmaWxsPSIjY2JjYmNiIi8+PC9zdmc+'" class="w-8 h-8 rounded-full border border-gray-200">
                                    <h3 class="font-bold text-gray-800 truncate">${page.title}</h3>
                                </div>
                                <button onclick="App.toggleFavorite('${page.id}', event)" class="text-xl ${page.isFavorite ? 'text-yellow-400' : 'text-gray-200 hover:text-gray-300'} transition p-1">
                                    <i class="fa-solid fa-star"></i>
                                </button>
                            </div>
                            <p class="text-xs text-blue-600 mb-2 truncate">${page.url}</p>
                            ${page.description ? `<p class="text-sm text-gray-600 line-clamp-2 mb-3 flex-grow">${page.description}</p>` : '<div class="flex-grow"></div>'}
                            ${page.memo ? `<div class="bg-yellow-50 text-yellow-800 text-xs p-2 rounded border border-yellow-100 mb-3"><i class="fa-solid fa-note-sticky"></i> ${page.memo}</div>` : ''}
                            <div class="flex justify-between items-center mt-auto border-t border-gray-100 pt-3">
                                <span class="text-[10px] text-gray-400">
                                    ${page.isSyncing ? '<i class="fa-solid fa-arrows-rotate fa-spin"></i> 同期中' : (page.githubUpdatedAt ? '更新: '+new Date(page.githubUpdatedAt).toLocaleDateString() : '')}
                                </span>
                                <div class="flex gap-2">
                                    <button onclick="event.stopPropagation(); UI.openAddModal('${page.id}')" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition">
                                        <i class="fa-solid fa-pen text-xs"></i>
                                    </button>
                                    <button onclick="App.deletePage('${page.id}', event)" class="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500 hover:bg-red-100 transition">
                                        <i class="fa-solid fa-trash text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            },

            // --- 5 Generations Auto Backup ---
            async createBackup() {
                const data = JSON.stringify(this.pages);
                const timestamp = Date.now();
                await db.put('backups', { timestamp, data });
                
                // Keep only last 5
                const backups = await db.getAll('backups');
                if (backups.length > 5) {
                    backups.sort((a, b) => a.timestamp - b.timestamp); // Ascending
                    const toDelete = backups.length - 5;
                    for(let i=0; i<toDelete; i++) {
                        await db.delete('backups', backups[i].timestamp);
                    }
                }
            },

            async renderBackups() {
                const list = document.getElementById('backupList');
                list.innerHTML = '';
                const backups = await db.getAll('backups');
                backups.sort((a, b) => b.timestamp - a.timestamp); // Descending

                if(backups.length === 0) {
                    list.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">バックアップはありません</p>';
                    return;
                }

                backups.forEach((b, index) => {
                    const date = new Date(b.timestamp).toLocaleString();
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100';
                    item.innerHTML = `
                        <div>
                            <p class="text-sm font-medium text-gray-800">${index === 0 ? '最新の保存' : '過去の保存'}</p>
                            <p class="text-xs text-gray-500">${date}</p>
                        </div>
                        <button onclick="App.restoreBackup(${b.timestamp})" class="px-3 py-1 bg-blue-100 text-blue-700 rounded text-xs font-bold hover:bg-blue-200">復元</button>
                    `;
                    list.appendChild(item);
                });
            },

            async restoreBackup(timestamp) {
                if(confirm('現在のデータは上書きされます。復元しますか？')) {
                    const backup = await db.get('backups', timestamp);
                    if(backup) {
                        const parsed = JSON.parse(backup.data);
                        await db.clear('pages');
                        for(const p of parsed) {
                            await db.put('pages', p);
                        }
                        this.pages = parsed;
                        this.renderList();
                        UI.closeModal('historyModal');
                        UI.showToast('復元しました', 'success');
                    }
                }
            },

            // --- Export / Import ---
            exportData() {
                const dataStr = JSON.stringify(this.pages, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `GPHub_Backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                UI.showToast("エクスポートしました", "success");
            },

            importData(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (!Array.isArray(imported)) throw new Error("無効なフォーマット");
                        
                        await db.clear('pages');
                        for(const p of imported) {
                            // Validation mock
                            if(p.id && p.url) await db.put('pages', p);
                        }
                        await this.loadPages();
                        await this.createBackup();
                        UI.closeModal('settingsModal');
                        UI.showToast("インポートしました", "success");
                    } catch (err) {
                        UI.showToast("読み込みに失敗しました", "error");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset input
            },

            async clearAllData() {
                if(confirm("すべてのデータと履歴を削除します。よろしいですか？")) {
                    await db.clear('pages');
                    await db.clear('backups');
                    this.pages = [];
                    this.renderList();
                    UI.closeModal('settingsModal');
                    UI.showToast("初期化しました");
                }
            },

            // --- Async Bulk Sync ---
            async syncAll() {
                if(this.pages.length === 0) return;
                
                await requestWakeLock();
                document.getElementById('sync-status').classList.remove('hidden');
                localStorage.setItem('syncInProgress', 'true');
                UI.showToast("一括更新を開始しました");

                this.pages.forEach(p => {
                    p.isSyncing = true;
                    worker.postMessage({ type: 'FETCH_METADATA', payload: { id: p.id, url: p.url, pat: this.getGithubPat() } });
                });
                this.renderList();
            }
        };

        // Initialize App on load
        window.addEventListener('DOMContentLoaded', () => {
            App.init();
        });

    </script>
