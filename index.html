
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <title>My GitHub Pages Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js & DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="manifest" id="manifest" href="">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --primary: #2563eb;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: calc(80px + var(--safe-bottom));
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .bottom-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #e5e7eb; padding-bottom: var(--safe-bottom); }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { animation: slideUp 0.3s ease-out forwards, fadeOut 0.3s ease-in 3.7s forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .ripple-target { position: relative; overflow: hidden; }
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 600ms linear; background-color: rgba(0, 0, 0, 0.15); pointer-events: none; }
        .bg-blue-600 .ripple { background-color: rgba(255, 255, 255, 0.4); }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
        .prose pre { background-color: #1f2937 !important; border-radius: 0.5rem; }
        .prose img { max-width: 100%; border-radius: 0.5rem; }
        .touch-target { min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-white/90 backdrop-blur-md shadow-sm px-4 py-3 flex justify-between items-center pt-[max(env(safe-area-inset-top),12px)]">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-brands fa-github text-2xl"></i> MyPages Hub
        </h1>
        <div class="flex items-center gap-2">
            <span id="sync-status" class="text-xs text-blue-600 hidden bg-blue-50 px-3 py-1.5 rounded-full font-bold shadow-sm flex items-center gap-2">
                <span><i class="fa-solid fa-arrows-rotate fa-spin mr-1"></i> <span id="sync-progress-text">同期中...</span></span>
                <button onclick="App.cancelSync()" class="text-red-500 hover:text-red-700 ml-1 pl-2 border-l border-blue-200 transition touch-target">停止</button>
            </span>
            <button onclick="UI.openSettingsModal()" class="touch-target rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition ripple-target">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4">
        <div class="flex gap-2 mb-4">
            <!-- Search -->
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="検索..." class="w-full bg-white border border-gray-200 rounded-2xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition min-h-[48px]">
            </div>
            <!-- Grouping Toggle -->
            <button onclick="App.toggleGroupView()" id="groupToggleBtn" class="bg-white border border-gray-200 rounded-2xl px-4 text-gray-600 hover:bg-gray-50 transition shadow-sm touch-target ripple-target" title="グループ表示切替">
                <i class="fa-solid fa-layer-group"></i>
            </button>
        </div>
        
        <!-- Tag Filter -->
        <div class="mb-6 overflow-x-auto hide-scroll flex gap-2 pb-2" id="tagFilterContainer"></div>

        <!-- Pages List -->
        <div id="pagesList"></div>
        
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-gray-400">
            <i class="fa-brands fa-github text-6xl mb-4 text-gray-300"></i>
            <p>ページがありません</p>
            <p class="text-xs mt-2 text-center px-4">設定からPATを登録して自動検出するか<br>右下の「＋」ボタンから追加してください</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 w-full z-20 flex justify-around items-center py-1 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="App.renderPages()" class="flex flex-col items-center text-blue-600 touch-target w-16 ripple-target rounded-xl"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[10px] font-medium">ホーム</span></button>
        <button onclick="App.renderFavorites()" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition touch-target w-16 ripple-target rounded-xl"><i class="fa-solid fa-star text-xl mb-1"></i><span class="text-[10px] font-medium">お気に入り</span></button>
        <!-- FAB Center -->
        <div class="relative -top-6">
            <button onclick="UI.openAddModal()" class="w-14 h-14 bg-blue-600 rounded-full shadow-lg flex items-center justify-center text-white text-2xl hover:bg-blue-700 transition transform hover:scale-105 active:scale-95 ripple-target"><i class="fa-solid fa-plus"></i></button>
        </div>
        <button onclick="App.syncAll()" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition touch-target w-16 ripple-target rounded-xl"><i class="fa-solid fa-rotate-right text-xl mb-1"></i><span class="text-[10px] font-medium">同期</span></button>
        <button onclick="UI.openHistoryModal()" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition touch-target w-16 ripple-target rounded-xl"><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[10px] font-medium">復元</span></button>
    </nav>

    <!-- Add/Edit/Create Modal -->
    <div id="addModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="history.back()"></div>
        <div class="bg-white w-full sm:w-[450px] max-h-[90vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="addModalContent">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4 sm:hidden"></div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold" id="modalTitle">ページの追加</h2>
                <div class="flex bg-gray-100 rounded-lg p-1" id="addTabs">
                    <button onclick="App.switchAddTab('exist')" id="tabExist" class="px-3 py-1 text-sm font-bold bg-white shadow-sm rounded-md text-blue-600">既存追加</button>
                    <button onclick="App.switchAddTab('new')" id="tabNew" class="px-3 py-1 text-sm font-bold text-gray-500 rounded-md">新規作成</button>
                </div>
            </div>

            <!-- Existing Page Form -->
            <form id="pageForm" onsubmit="App.handleSavePage(event)" class="space-y-4">
                <input type="hidden" id="pageId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">GitHub Pages URL *</label>
                    <input type="url" id="pageUrl" required placeholder="https://user.github.io/repo/" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500">
                    <p class="text-xs text-red-500 mt-1 hidden" id="urlError">有効なURLを入力してください。</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">タイトル (任意)</label>
                    <input type="text" id="pageTitle" placeholder="自動取得されます" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">グループ (任意・整理用)</label>
                    <input type="text" id="pageGroup" placeholder="例: クライアントA" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500" list="groupList">
                    <datalist id="groupList"></datalist>
                </div>
                <div>
                    <label class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                        <span>タグ (カンマ区切り)</span>
                        <button type="button" onclick="App.generateTagsAI()" class="text-purple-600 font-bold flex items-center gap-1"><i class="fa-solid fa-wand-magic-sparkles"></i> AIで生成</button>
                    </label>
                    <input type="text" id="pageTags" placeholder="例: ツール, 予約" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">メモ</label>
                    <textarea id="pageMemo" rows="2" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="flex gap-3 pb-safe pt-2">
                    <button type="button" onclick="history.back()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium ripple-target min-h-[48px]">キャンセル</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-medium flex justify-center items-center gap-2 ripple-target min-h-[48px]"><i class="fa-solid fa-check"></i> 保存</button>
                </div>
            </form>

            <!-- New Repo Form -->
            <form id="repoForm" onsubmit="App.handleCreateRepo(event)" class="hidden space-y-4">
                <div class="bg-blue-50 text-blue-800 text-xs p-3 rounded-xl border border-blue-100 mb-2">
                    <i class="fa-solid fa-circle-info"></i> 設定にPAT(repo権限)が登録されている必要があります。空のリポジトリが作成されます。
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">リポジトリ名 (英数字) *</label>
                    <input type="text" id="newRepoName" required pattern="[a-zA-Z0-9\-_]+" placeholder="my-new-project" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">説明 (任意)</label>
                    <input type="text" id="newRepoDesc" placeholder="リポジトリの説明" class="w-full border border-gray-300 rounded-xl py-3 px-3 focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex gap-3 pb-safe pt-2">
                    <button type="button" onclick="history.back()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium ripple-target min-h-[48px]">キャンセル</button>
                    <button type="submit" id="createRepoBtn" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-medium flex justify-center items-center gap-2 ripple-target min-h-[48px]"><i class="fa-solid fa-rocket"></i> 作成する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings & History Modals (Omitted unchanged details, keeping minimal structure) -->
    <div id="settingsModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="history.back()"></div>
        <div class="bg-white w-full sm:w-[450px] max-h-[90vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="settingsModalContent">
            <h2 class="text-xl font-bold mb-4">設定</h2>
            <div class="space-y-4">
                <div class="p-4 bg-gray-50 rounded-xl border"><h3 class="font-bold mb-2">GitHub PAT (repo, delete_repo権限推奨)</h3>
                    <input type="password" id="githubPat" placeholder="ghp_..." class="w-full border rounded-lg py-3 px-3 mb-2">
                </div>
                <div class="p-4 bg-purple-50 rounded-xl border"><h3 class="font-bold text-purple-800 mb-2">AI連携 (Gemini)</h3>
                    <input type="password" id="aiApiKey" placeholder="AI API Key" class="w-full border rounded-lg py-3 px-3 mb-2">
                    <textarea id="aiPrompt" rows="2" class="w-full border rounded-lg py-2 px-3 mb-2"></textarea>
                </div>
                <button onclick="App.saveSettings()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium ripple-target min-h-[48px]">保存</button>
            </div>
            <button onclick="history.back()" class="w-full mt-4 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium ripple-target min-h-[48px] mb-safe">閉じる</button>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="history.back()"></div>
        <div class="bg-white w-full sm:w-[400px] rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="historyModalContent">
            <h2 class="text-xl font-bold mb-4">バックアップ履歴</h2>
            <div id="backupList" class="space-y-3 max-h-60 overflow-y-auto pr-1 hide-scroll"></div>
            <button onclick="history.back()" class="w-full mt-6 py-3 bg-gray-100 rounded-xl mb-safe min-h-[48px]">閉じる</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="history.back()"></div>
        <div class="bg-white w-full sm:w-[400px] rounded-t-3xl sm:rounded-3xl p-6 relative z-10 transform transition-transform translate-y-full" id="deleteModalContent">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">ページの削除</h2>
                <p class="text-sm text-gray-600">このページをリストから削除しますか？</p>
            </div>
            <div class="mb-6 p-4 bg-gray-50 border border-gray-200 rounded-xl">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="deleteRepoCheck" class="mt-1 w-5 h-5 text-red-600 border-gray-300 rounded focus:ring-red-500">
                    <span class="text-sm text-gray-700"><strong>[危険]</strong> GitHub上のリポジトリも完全に削除する (設定にdelete_repo権限を持つPATが必要)</span>
                </label>
            </div>
            <div class="flex gap-3 pb-safe">
                <button onclick="history.back()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium ripple-target min-h-[48px]">キャンセル</button>
                <button onclick="App.executeDelete()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-medium flex justify-center items-center gap-2 ripple-target min-h-[48px]"><i class="fa-solid fa-trash"></i> 削除</button>
            </div>
        </div>
    </div>

    <!-- Actions Monitoring Modal -->
    <div id="actionsModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="history.back()"></div>
        <div class="bg-white w-full sm:w-[500px] h-[80vh] sm:max-h-[85vh] flex flex-col rounded-t-3xl sm:rounded-3xl p-0 relative z-10 transform transition-transform translate-y-full" id="actionsModalContent">
            <div class="p-4 sm:p-6 pb-4 border-b border-gray-100 shrink-0 flex justify-between items-center pt-[max(env(safe-area-inset-top),16px)]">
                <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-play text-blue-500"></i> Actions履歴</h2>
                <button onclick="history.back()" class="touch-target rounded-full bg-gray-100"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 overflow-y-auto grow bg-gray-50 pb-safe">
                <div id="actionsLoading" class="flex justify-center py-10"><div class="loader"></div></div>
                <div id="actionsList" class="space-y-3 hidden"></div>
                <div id="actionsEmpty" class="hidden text-center py-10 text-gray-500"><i class="fa-solid fa-ghost text-4xl mb-3"></i><p>履歴が見つかりません</p></div>
            </div>
        </div>
    </div>

    <!-- Readme Modal (Enhanced with Edit) -->
    <div id="readmeModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="history.back()"></div>
        <div class="bg-white w-full sm:w-[800px] h-[90vh] sm:max-h-[85vh] flex flex-col rounded-t-3xl sm:rounded-3xl p-0 relative z-10 transform transition-transform translate-y-full" id="readmeModalContent">
            <div class="p-4 sm:p-6 pb-4 border-b border-gray-100 shrink-0 bg-white pt-[max(env(safe-area-inset-top),16px)]">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold truncate pr-4" id="readmeTitle"></h2>
                    <div class="flex gap-2">
                        <button onclick="App.toggleReadmeEdit()" id="readmeEditBtn" class="touch-target rounded-xl px-4 bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition"><i class="fa-solid fa-pen"></i> 編集</button>
                        <button onclick="history.back()" class="touch-target rounded-full bg-gray-100"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
            </div>
            <div class="p-4 sm:p-6 overflow-y-auto grow bg-gray-50/50 pb-safe relative" id="readmeViewArea">
                <div id="readmeLoading" class="hidden flex justify-center py-20 text-blue-500"><div class="loader"></div></div>
                <div id="readmeError" class="hidden text-center py-20 text-red-400">
                    <p class="mb-4">Readmeが見つかりません</p>
                    <button onclick="App.generateReadmeAI()" class="px-6 py-3 bg-purple-600 text-white rounded-xl shadow-lg"><i class="fa-solid fa-wand-magic-sparkles"></i> AIで自動生成</button>
                </div>
                <div id="readmeBody" class="prose prose-sm sm:prose-base prose-blue max-w-none"></div>
            </div>
            <div class="p-4 overflow-y-auto grow bg-white pb-safe hidden flex-col" id="readmeEditArea">
                <textarea id="readmeEditor" class="w-full h-full min-h-[300px] border border-gray-300 rounded-xl p-4 font-mono text-sm focus:ring-2 focus:ring-blue-500 mb-4" placeholder="Markdown形式で入力..."></textarea>
                <div class="flex gap-3">
                    <button onclick="App.toggleReadmeEdit()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">キャンセル</button>
                    <button onclick="App.saveReadme()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold"><i class="fa-solid fa-check"></i> 保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none w-[90%] sm:w-auto items-center"></div>

    <script>
        // --- 1. Manifest & SW Update Detection ---
        const manifest = { name: "MyPages Hub", short_name: "MyPages", start_url: ".", display: "standalone", background_color: "#f3f4f6", theme_color: "#2563eb", icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTEyIDBDNS4zNyAwIDAgNS4zNyAwIDEyYzAgNS4zMSAzLjQzNSA5LjgyNiA4LjIwNiAxMS4zODcuNi4xMTEuODE4LS4yNi44MTgtLjU3OHYtMi4wNDRjLTMuMzM4LjcyNC00LjA0Mi0xLjYxLTQuMDQyLTEuNjFDNC40MjIgMTguMDcgMy42MzMgMTcuNyAzLjYzMyAxNy43Yy0xLjA4Ny0uNzQ0LjA4NC0uNzI5LjA4NC0uNzI5IDEuMjA1LjA4NCAxLjgzOCAxLjIzNiAxLjgzOCAxLjIzNiAxLjA3IDEuODM1IDIuODA5IDEuMzA1IDMuNDk1Ljk5OC4xMDgtLjc3Ni40MTctMS4zMDUuNzYtMS42MDUtMi42NjUtLjMwMy01LjQ2Ni0xLjMzMi01LjQ2Ni01LjkzIDAtMS4zMS40NjUtMi4zOCAxLjIzNS0zLjIyMi0uMTIzLS4zMDMtLjUzNS0xLjUyMy4xMTctMy4xNzYgMCAwIDEuMDA4LS4zMjIgMy4zMDEgMS4yMy45NTctLjI2NiAxLjk4My0uMzk4IDMuMDAzLS40MDQgMS4wMi4wMDYgMi4wNDYuMTM4IDMuMDAzLjQwNCAyLjI5MS0xLjU1MiAzLjI5Ny0xLjIzIDMyLjk3LTEuMjMuNjUzIDEuNjUzLjI0MiAyLjg3NC4xMTggMy4xNzYuNzcuODQgMS4yMzUgMS45MTEgMS4yMzUgMy4yMjIgMCA0LjYxLTIuODA1IDUuNjI1LTUuNDc1IDUuOTIuNDIuMzYuODEgMS4wOTYuODEgMi4yMmwwIDMuMjJjMCAuMzIuMjE2LjY5NC44MjUuNTc2QzIwLjU2NSAyMS44MjYgMjQgMTcuMzEgMjQgMTJjMC02LjYzLLTUuMzctMTItMTItMTJ6IiBmaWxsPSIjMjU2M2ViIi8+PC9zdmc+", sizes: "192x192", type: "image/svg+xml" }] };
        document.getElementById('manifest').href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                UI.showToast(`アプリが更新されました。<button onclick="location.reload()" class="ml-2 underline font-bold text-white">再読込</button>`, "info");
                            }
                        });
                    });
                }).catch(()=>console.log("SW bypass for local dev"));
            });
        }

        // --- 2. DB ---
        class DB {
            constructor() { this.dbName = 'MyPagesDB'; this.version = 3; this.db = null; }
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.dbName, this.version);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('pages')) db.createObjectStore('pages', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('backups')) db.createObjectStore('backups', { keyPath: 'timestamp' });
                    };
                    req.onsuccess = e => { this.db = e.target.result; resolve(); };
                    req.onerror = e => reject(e.target.error);
                });
            }
            async get(s, k) { return new Promise(r => { const req = this.db.transaction(s).objectStore(s).get(k); req.onsuccess = ()=>r(req.result); }); }
            async getAll(s) { return new Promise(r => { const req = this.db.transaction(s).objectStore(s).getAll(); req.onsuccess = ()=>r(req.result); }); }
            async put(s, d) { return new Promise(r => { const req = this.db.transaction(s, 'readwrite').objectStore(s).put(d); req.onsuccess = ()=>r(req.result); }); }
            async delete(s, k) { return new Promise(r => { const req = this.db.transaction(s, 'readwrite').objectStore(s).delete(k); req.onsuccess = ()=>r(); }); }
        }
        const db = new DB();

        // --- Web Worker ---
        const workerCode = `
            self.onmessage = async function(e) {
                const { type, payload } = e.data;
                const headers = { 'Accept': 'application/vnd.github.v3+json' };
                if (payload.pat) headers['Authorization'] = \`Bearer \${payload.pat}\`;
                
                try {
                    if (type === 'FETCH_METADATA') {
                        const match = payload.url.replace(/\\/$/, "").match(/https?:\\/\\/([\\w\\-]+)\\.github\\.io\\/?([\\w\\-\\.]+)?/i);
                        if (match) {
                            const user = match[1], repo = match[2];
                            const apiUrl = repo ? \`https://api.github.com/repos/\${user}/\${repo}\` : \`https://api.github.com/users/\${user}\`;
                            if (payload.lastFetch) headers['If-Modified-Since'] = new Date(payload.lastFetch).toUTCString();
                            const res = await fetch(apiUrl, { headers });
                            if (res.status === 304) return self.postMessage({ type: 'METADATA_RESULT', payload: { id: payload.id, status: 'not_modified' } });
                            if (res.ok) {
                                const data = await res.json();
                                return self.postMessage({ type: 'METADATA_RESULT', payload: { id: payload.id, title: data.name, description: data.description || "", lastUpdated: data.updated_at, githubRepoUrl: data.html_url, status: 'success' }});
                            }
                        }
                        self.postMessage({ type: 'METADATA_RESULT', payload: { id: payload.id, status: 'error' } });
                    }
                    else if (type === 'CREATE_REPO') {
                        headers['Content-Type'] = 'application/json';
                        const res = await fetch('https://api.github.com/user/repos', { method: 'POST', headers, body: JSON.stringify({ name: payload.name, description: payload.description, has_pages: true, auto_init: true }) });
                        if(res.ok) self.postMessage({ type: 'CREATE_REPO_RESULT', payload: { status: 'success', data: await res.json() } });
                        else throw new Error("API Error");
                    }
                    else if (type === 'DELETE_REPO') {
                        const res = await fetch(\`https://api.github.com/repos/\${payload.owner}/\${payload.repo}\`, { method: 'DELETE', headers });
                        if(res.ok || res.status === 404) self.postMessage({ type: 'DELETE_REPO_RESULT', payload: { status: 'success', id: payload.id } });
                        else throw new Error("API Error");
                    }
                    else if (type === 'FETCH_ACTIONS') {
                        const res = await fetch(\`https://api.github.com/repos/\${payload.owner}/\${payload.repo}/actions/runs?per_page=5\`, { headers });
                        if(res.ok) {
                            const data = await res.json();
                            self.postMessage({ type: 'ACTIONS_RESULT', payload: { status: 'success', runs: data.workflow_runs } });
                        } else throw new Error("API Error");
                    }
                    else if (type === 'FETCH_README') {
                        headers['Accept'] = 'application/vnd.github.v3.raw';
                        const res = await fetch(\`https://api.github.com/repos/\${payload.owner}/\${payload.repo}/readme\`, { headers });
                        if (res.ok) self.postMessage({ type: 'README_RESULT', payload: { id: payload.id, status: 'success', content: await res.text() } });
                        else self.postMessage({ type: 'README_RESULT', payload: { id: payload.id, status: 'error' } });
                    }
                } catch(err) { self.postMessage({ type: type+'_RESULT', payload: { status: 'error', id: payload.id } }); }
            };
        `;
        const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));

        // --- UI & State ---
        const UI = {
            activeModals: [],
            showToast(msg, type = 'info') {
                const c = document.getElementById('toastContainer');
                const t = document.createElement('div');
                const colors = { success: 'bg-gray-800 text-white', error: 'bg-red-600 text-white', info: 'bg-blue-600 text-white' };
                t.className = `px-4 py-3 rounded-xl shadow-xl text-sm font-bold toast ${colors[type]} flex items-center gap-2`;
                t.innerHTML = msg; c.appendChild(t); setTimeout(() => t.remove(), 4000);
            },
            openModal(id) {
                if(this.activeModals.includes(id)) return;
                document.getElementById(id).classList.remove('hidden'); void document.getElementById(id).offsetWidth;
                document.getElementById(id+'Content').classList.remove('translate-y-full');
                this.activeModals.push(id); history.pushState({ modal: id }, '');
            },
            closeModal(id) {
                const el = document.getElementById(id);
                if(el && !el.classList.contains('hidden')) {
                    document.getElementById(id+'Content').classList.add('translate-y-full');
                    setTimeout(() => el.classList.add('hidden'), 300);
                    this.activeModals = this.activeModals.filter(m => m !== id);
                }
            },
            openAddModal(pageId = null) {
                document.getElementById('pageForm').reset(); document.getElementById('repoForm').reset();
                App.switchAddTab('exist');
                if (pageId) {
                    const p = App.pages.find(x => x.id === pageId);
                    if(p) {
                        document.getElementById('pageId').value = p.id; document.getElementById('pageUrl').value = p.url;
                        document.getElementById('pageTitle').value = p.title || ''; document.getElementById('pageGroup').value = p.group || '';
                        document.getElementById('pageMemo').value = p.memo || ''; document.getElementById('pageTags').value = (p.tags||[]).join(', ');
                    }
                } else document.getElementById('pageId').value = '';
                this.openModal('addModal');
            },
            openSettingsModal() { this.openModal('settingsModal'); },
            openHistoryModal() { this.openModal('historyModal'); }
        };

        window.addEventListener('popstate', () => { if (UI.activeModals.length > 0) UI.closeModal(UI.activeModals.pop()); });

        const App = {
            pages: [], filterMode: 'all', activeTag: null, searchQuery: '', isGroupView: false, targetDeleteId: null, currentReadmeId: null,

            async init() {
                await db.init();
                ['githubPat', 'aiApiKey', 'aiPrompt'].forEach(k => { if(localStorage.getItem(k)) document.getElementById(k).value = localStorage.getItem(k); });
                this.pages = await db.getAll('pages'); this.pages.sort((a,b)=>b.updatedAt-a.updatedAt);
                this.setupWorker(); this.renderPages();
            },
            saveSettings() {
                ['githubPat', 'aiApiKey', 'aiPrompt'].forEach(k => {
                    const v = document.getElementById(k).value.trim(); if(v) localStorage.setItem(k, v); else localStorage.removeItem(k);
                }); UI.showToast("設定を保存しました", "success");
            },

            setupWorker() {
                worker.onmessage = async (e) => {
                    const { type, payload } = e.data;
                    if (type === 'METADATA_RESULT' && payload.status === 'success') {
                        const p = this.pages.find(x => x.id === payload.id);
                        if(p) { p.title = p.hasCustomTitle ? p.title : payload.title; p.githubUpdatedAt = payload.lastUpdated; p.githubRepoUrl = payload.githubRepoUrl; p.lastFetch = new Date().toISOString(); db.put('pages', p); this.renderList(); }
                    } else if (type === 'CREATE_REPO_RESULT') {
                        document.getElementById('createRepoBtn').innerHTML = '<i class="fa-solid fa-rocket"></i> 作成する';
                        if (payload.status === 'success') {
                            const now = Date.now();
                            const p = { id: 'p_'+now, url: `https://${payload.data.owner.login}.github.io/${payload.data.name}/`, title: payload.data.name, group: '未分類', tags: [], memo: '', createdAt: now, updatedAt: now };
                            this.pages.unshift(p); await db.put('pages', p); this.renderList(); history.back(); UI.showToast("リポジトリを作成しました", "success");
                        } else UI.showToast("リポジトリ作成に失敗しました。PATの権限等を確認してください", "error");
                    } else if (type === 'DELETE_REPO_RESULT') {
                        if (payload.status === 'success') UI.showToast("GitHub上のリポジトリを削除しました", "success");
                        else UI.showToast("GitHub上の削除に失敗しました（ローカルのみ削除されます）", "error");
                    } else if (type === 'ACTIONS_RESULT') {
                        document.getElementById('actionsLoading').classList.add('hidden');
                        const list = document.getElementById('actionsList'); list.innerHTML = '';
                        if(payload.status === 'success' && payload.runs.length > 0) {
                            list.classList.remove('hidden');
                            payload.runs.forEach(r => {
                                const statusColor = r.conclusion === 'success' ? 'text-green-500' : (r.conclusion === 'failure' ? 'text-red-500' : 'text-yellow-500');
                                const icon = r.conclusion === 'success' ? 'fa-check-circle' : (r.conclusion === 'failure' ? 'fa-times-circle' : 'fa-spinner fa-spin');
                                list.innerHTML += `<div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                                    <div><p class="font-bold text-sm text-gray-800">${r.name}</p><p class="text-xs text-gray-500">${new Date(r.updated_at).toLocaleString()}</p></div>
                                    <div class="${statusColor} flex flex-col items-end"><i class="fa-solid ${icon} text-lg mb-1"></i><a href="${r.html_url}" target="_blank" class="text-[10px] underline">詳細</a></div>
                                </div>`;
                            });
                        } else { document.getElementById('actionsEmpty').classList.remove('hidden'); }
                    } else if (type === 'README_RESULT') {
                        document.getElementById('readmeLoading').classList.add('hidden');
                        const p = this.pages.find(x => x.id === payload.id);
                        if (payload.status === 'success' && p) {
                            p.readmeContent = payload.content; db.put('pages', p);
                            document.getElementById('readmeBody').innerHTML = DOMPurify.sanitize(marked.parse(payload.content));
                        } else document.getElementById('readmeError').classList.remove('hidden');
                    }
                };
            },

            // --- UI Interaction ---
            switchAddTab(tab) {
                document.getElementById('pageForm').classList.toggle('hidden', tab !== 'exist');
                document.getElementById('repoForm').classList.toggle('hidden', tab !== 'new');
                document.getElementById('tabExist').className = tab === 'exist' ? 'px-3 py-1 text-sm font-bold bg-white shadow-sm rounded-md text-blue-600' : 'px-3 py-1 text-sm font-bold text-gray-500 rounded-md';
                document.getElementById('tabNew').className = tab === 'new' ? 'px-3 py-1 text-sm font-bold bg-white shadow-sm rounded-md text-blue-600' : 'px-3 py-1 text-sm font-bold text-gray-500 rounded-md';
            },

            async handleSavePage(e) {
                e.preventDefault();
                const url = document.getElementById('pageUrl').value.trim(); const id = document.getElementById('pageId').value;
                const title = document.getElementById('pageTitle').value.trim(); const group = document.getElementById('pageGroup').value.trim();
                const tags = document.getElementById('pageTags').value.split(',').map(t=>t.trim()).filter(t=>t);
                const memo = document.getElementById('pageMemo').value.trim(); const now = Date.now();
                
                let p = id ? this.pages.find(x => x.id === id) : { id: 'p_'+now, url, isFavorite: false, createdAt: now };
                p.url = url; p.hasCustomTitle = !!title; p.title = title || p.title || '取得中...'; p.group = group || '未分類';
                p.tags = tags; p.memo = memo; p.updatedAt = now;
                
                if(!id) this.pages.unshift(p); await db.put('pages', p);
                history.back(); this.renderList(); UI.showToast("保存しました", "success");
                worker.postMessage({ type: 'FETCH_METADATA', payload: { id: p.id, url: p.url, pat: localStorage.getItem('githubPat') } });
            },

            async handleCreateRepo(e) {
                e.preventDefault();
                const name = document.getElementById('newRepoName').value.trim(); const desc = document.getElementById('newRepoDesc').value.trim();
                const pat = localStorage.getItem('githubPat');
                if(!pat) return UI.showToast("設定からGitHub PATを登録してください", "error");
                document.getElementById('createRepoBtn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 作成中...';
                worker.postMessage({ type: 'CREATE_REPO', payload: { pat, name, description: desc } });
            },

            confirmDelete(id) { this.targetDeleteId = id; document.getElementById('deleteRepoCheck').checked = false; UI.openModal('deleteModal'); },
            async executeDelete() {
                const p = this.pages.find(x => x.id === this.targetDeleteId);
                if(p) {
                    if (document.getElementById('deleteRepoCheck').checked) {
                        const match = p.url.match(/https?:\/\/([\w\-]+)\.github\.io\/?([\w\-\.]+)?/i);
                        if(match && match[2]) worker.postMessage({ type: 'DELETE_REPO', payload: { id: p.id, owner: match[1], repo: match[2], pat: localStorage.getItem('githubPat') } });
                    }
                    await db.delete('pages', p.id); this.pages = this.pages.filter(x => x.id !== p.id);
                    this.renderList(); UI.showToast("削除しました"); history.back();
                }
            },

            async generateTagsAI() {
                const apiKey = localStorage.getItem('aiApiKey');
                if(!apiKey) return UI.showToast("設定からGemini API Keyを登録してください", "error");
                const url = document.getElementById('pageUrl').value || document.getElementById('pageTitle').value;
                if(!url) return UI.showToast("URLまたはタイトルを入力してください", "info");
                
                try {
                    UI.showToast("AIがタグを生成中...", "info");
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: `以下のプロジェクト情報から、アプリのジャンルや技術を表すタグを3〜5個、カンマ区切りで出力してください。説明不要です。情報: ${url}` }]}] })
                    });
                    const data = await res.json();
                    document.getElementById('pageTags').value = data.candidates[0].content.parts[0].text.trim();
                    UI.showToast("タグを生成しました", "success");
                } catch(e) { UI.showToast("生成に失敗しました", "error"); }
            },

            openActions(id) {
                const p = this.pages.find(x => x.id === id); if(!p) return;
                const match = p.url.match(/https?:\/\/([\w\-]+)\.github\.io\/?([\w\-\.]+)?/i);
                if(match && match[2]) {
                    document.getElementById('actionsLoading').classList.remove('hidden');
                    document.getElementById('actionsList').classList.add('hidden');
                    document.getElementById('actionsEmpty').classList.add('hidden');
                    UI.openModal('actionsModal');
                    worker.postMessage({ type: 'FETCH_ACTIONS', payload: { owner: match[1], repo: match[2], pat: localStorage.getItem('githubPat') } });
                } else UI.showToast("リポジトリが特定できません", "error");
            },

            openReadme(id) {
                const p = this.pages.find(x => x.id === id); if(!p) return;
                this.currentReadmeId = id;
                document.getElementById('readmeTitle').innerHTML = `<i class="fa-solid fa-book-open mr-2 text-blue-500"></i>${p.title}`;
                document.getElementById('readmeViewArea').classList.remove('hidden'); document.getElementById('readmeEditArea').classList.add('hidden');
                document.getElementById('readmeEditBtn').innerHTML = '<i class="fa-solid fa-pen"></i> 編集';
                
                if (p.readmeContent) {
                    document.getElementById('readmeLoading').classList.add('hidden'); document.getElementById('readmeError').classList.add('hidden');
                    document.getElementById('readmeBody').innerHTML = DOMPurify.sanitize(marked.parse(p.readmeContent));
                } else {
                    document.getElementById('readmeLoading').classList.remove('hidden'); document.getElementById('readmeBody').innerHTML = '';
                    const match = p.url.match(/https?:\/\/([\w\-]+)\.github\.io\/?([\w\-\.]+)?/i);
                    if(match) worker.postMessage({ type: 'FETCH_README', payload: { id: p.id, owner: match[1], repo: match[2]||`${match[1]}.github.io`, pat: localStorage.getItem('githubPat') } });
                }
                UI.openModal('readmeModal');
            },
            toggleReadmeEdit() {
                const isEdit = document.getElementById('readmeEditArea').classList.contains('hidden');
                document.getElementById('readmeViewArea').classList.toggle('hidden', isEdit);
                document.getElementById('readmeEditArea').classList.toggle('hidden', !isEdit);
                document.getElementById('readmeEditBtn').classList.toggle('hidden', isEdit); // Hide edit button while editing
                if(isEdit) {
                    const p = this.pages.find(x => x.id === this.currentReadmeId);
                    document.getElementById('readmeEditor').value = p.readmeContent || '';
                }
            },
            async saveReadme() {
                const p = this.pages.find(x => x.id === this.currentReadmeId);
                if(p) {
                    p.readmeContent = document.getElementById('readmeEditor').value; await db.put('pages', p);
                    document.getElementById('readmeBody').innerHTML = DOMPurify.sanitize(marked.parse(p.readmeContent));
                    this.toggleReadmeEdit(); UI.showToast("Readmeを保存しました", "success");
                }
            },

            toggleGroupView() { this.isGroupView = !this.isGroupView; document.getElementById('groupToggleBtn').classList.toggle('bg-blue-50', this.isGroupView); document.getElementById('groupToggleBtn').classList.toggle('text-blue-600', this.isGroupView); this.renderList(); },
            renderPages() { this.filterMode = 'all'; this.renderList(); }, renderFavorites() { this.filterMode = 'favorites'; this.renderList(); },

            renderList() {
                const c = document.getElementById('pagesList'); c.innerHTML = '';
                let f = this.pages; if (this.filterMode === 'favorites') f = f.filter(p => p.isFavorite);
                this.searchQuery = document.getElementById('searchInput').value.toLowerCase();
                if (this.searchQuery) f = f.filter(p => p.url.toLowerCase().includes(this.searchQuery) || (p.title&&p.title.toLowerCase().includes(this.searchQuery)) || (p.tags&&p.tags.some(t=>t.toLowerCase().includes(this.searchQuery))));

                // Update Datalist for Auto-complete
                const groups = new Set(this.pages.map(p => p.group || '未分類'));
                document.getElementById('groupList').innerHTML = Array.from(groups).map(g => `<option value="${g}">`).join('');

                if (f.length === 0) { document.getElementById('emptyState').classList.remove('hidden'); return; }
                document.getElementById('emptyState').classList.add('hidden');

                const renderCards = (pagesArr) => `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">` + pagesArr.map(p => `
                    <div class="card p-4 relative cursor-pointer flex flex-col h-full ripple-target" onclick="window.open('${p.url}', '_blank')">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-gray-800 truncate text-lg pr-2">${p.title}</h3>
                            <button onclick="event.stopPropagation(); const px=App.pages.find(x=>x.id==='${p.id}'); px.isFavorite=!px.isFavorite; db.put('pages', px).then(()=>App.renderList());" class="touch-target text-xl ${p.isFavorite ? 'text-yellow-400' : 'text-gray-200'} transition -mr-2 -mt-2"><i class="fa-solid fa-star"></i></button>
                        </div>
                        <p class="text-xs text-blue-600 mb-2 truncate">${p.url}</p>
                        ${p.tags && p.tags.length ? `<div class="flex gap-1 mb-2 flex-wrap">${p.tags.map(t=>`<span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${t}</span>`).join('')}</div>` : ''}
                        ${p.memo ? `<div class="bg-yellow-50 text-yellow-800 text-xs p-2 rounded border border-yellow-100 mb-3 line-clamp-1"><i class="fa-solid fa-note-sticky"></i> ${p.memo}</div>` : '<div class="flex-grow"></div>'}
                        <div class="flex gap-2 mb-3 mt-1">
                            <button onclick="event.stopPropagation(); App.openReadme('${p.id}')" class="flex-1 flex items-center justify-center gap-1 py-2 px-2 bg-blue-50 text-blue-700 rounded-xl text-xs font-bold ripple-target"><i class="fa-solid fa-book-open"></i> Readme</button>
                            <button onclick="event.stopPropagation(); App.openActions('${p.id}')" class="flex-1 flex items-center justify-center gap-1 py-2 px-2 bg-gray-50 text-gray-700 rounded-xl text-xs font-bold ripple-target"><i class="fa-solid fa-play"></i> Actions</button>
                        </div>
                        <div class="flex justify-between items-center mt-auto border-t border-gray-100 pt-3">
                            <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded-md"><i class="fa-solid fa-folder"></i> ${p.group || '未分類'}</span>
                            <div class="flex gap-1 -mr-2">
                                <button onclick="event.stopPropagation(); UI.openAddModal('${p.id}')" class="touch-target rounded-full bg-gray-50 text-gray-500 w-10 h-10"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="event.stopPropagation(); App.confirmDelete('${p.id}')" class="touch-target rounded-full bg-red-50 text-red-500 w-10 h-10"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                        </div>
                    </div>`).join('') + `</div>`;

                if (this.isGroupView) {
                    const grouped = f.reduce((acc, p) => { const g = p.group || '未分類'; acc[g] = acc[g] || []; acc[g].push(p); return acc; }, {});
                    c.innerHTML = Object.keys(grouped).sort().map(g => `<h2 class="text-lg font-bold mt-6 mb-3 text-gray-700 flex items-center gap-2"><i class="fa-solid fa-layer-group text-blue-500 text-sm"></i> ${g} <span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full">${grouped[g].length}</span></h2>${renderCards(grouped[g])}`).join('');
                } else c.innerHTML = renderCards(f);
            }
        };

        document.getElementById('searchInput').addEventListener('input', () => App.renderList());
        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
